<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biblical Articles</title>
<link rel="stylesheet" href="style.css">

<style>
.container {
    max-width: 1000px;
    margin: auto;
    padding: 20px;
}

input {
    width: 100%;
    padding: 10px;
    margin-bottom: 20px;
    font-size: 16px;
}

.filter-btn {
    padding: 8px 15px;
    margin: 5px;
    background: darkblue;
    color: white;
    border: none;
    cursor: pointer;
}

.article {
    background: #f4f4f4;
    padding: 15px;
    margin: 10px 0;
    border-radius: 5px;
}

.viewer {
    width: 100%;
    height: 500px;
    margin-top: 20px;
    border: 1px solid #ccc;
}
</style>

</head>

<body>

<header>
    <h1>CHRISTIAN KNOWLEDGE</h1>
    <p>Biblical Articles</p>
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="books.html">Books</a>
    <a href="videos.html">Videos</a>
    <a href="articles.html">Biblical Articles</a>
</nav>

<div class="container">

<h2>Articles Library</h2>

<input type="text" id="search" placeholder="Search articles..." onkeyup="searchArticles()">

<!-- CATEGORY FILTER -->
<div>
<button class="filter-btn" onclick="filterCategory('all')">All</button>
<button class="filter-btn" onclick="filterCategory('trinity')">Trinity</button>
<button class="filter-btn" onclick="filterCategory('jesus')">Jesus</button>
<button class="filter-btn" onclick="filterCategory('refutation')">Refutations</button>
<button class="filter-btn" onclick="filterCategory('salvation')">Salvation</button>
</div>

<div id="articles-list"></div>

<!-- PDF VIEWER -->
<iframe id="viewer" class="viewer"></iframe>

</div>

<script>

const articles = [
   "4 KINGDOMS AND 5TH KINGDOM.pdf",
"Blasphemies of Jehovah's witnesses.pdf",
"Constantine didn't established Christianity.pdf",
"Deep Knowledge of God's Existence.pdf",
"Did Christ said we must keep the Law.pdf",
"Did God promote Genocide in the OT.pdf",
"DID YESHUA TEACH PEOPLE TO KEEP THE LAW.pdf",
"GOD ALREADY PREPARED US FOR THE NEW.pdf",
"GOD IS NOT ONE PERSON.pdf",
"Is Jesus Name God the Father.pdf",
"JESUS AND THE SPIRIT IS YAHWEH GOD.pdf",
"JESUS IS GOD ACCORDING TO THE QURAN.pdf",
"JESUS IS JEHOVAH GOD IN JW BIBLE.pdf",
"JESUS THE ANGEL OF THE LORD.pdf",
"JOHN 17.pdf",
"ONE ACT OF THE TRIUNE GOD.pdf",
"OT prophets believed the Christ to be YAHWEH.pdf",
"Perfect unity of Mankind.pdf",
"PROVING JESUS IN ALMOST EVERY CHAPTER.pdf",
"REFUTATING LIES AGAINST CHRISTIANITY.pdf",
"SALVATION IS FOR THE GENTILES TOO.pdf",
"SHEMBE IS NOT THE HOLY SPIRIT.pdf",
"STORY OF AN ADULTEROUS WOMAN.pdf",
"The Christians are the Chosen Nation.pdf",
"THE CHURCH ARE THE REAL JEWS.pdf",
"The Deity of The Holy Spirit.pdf",
"THE ETERNAL WORD OF YAHWEH IN OT.pdf",
"The God Yahweh of the OT is The Father.pdf",
"THE HOLY SPIRIT IS GOD A PERSON.pdf",
"The Mystery of the Kingdom of God.pdf",
"The Mystery of The Seven Eyes.pdf",
"THE MYSTERY OF THE WISDOM AND POWER.pdf",
"THE PERSONS OF THE TRINITY MUTUAL.pdf",
"THE POWERFUL MESSAGE ABOUT THE GOSPEL.pdf",
"The Royal Sonship of Jesus.pdf",
"The Son of God in the Old Testament.pdf",
"The Son reveals the Father.pdf",
"The Trinity in simple analogy.pdf",
"The True Church of Yeshua.pdf",
"Umthetho vs Umusa.pdf",
"Why Jesus fasted 40 days and 40 nights.pdf"
];

const list = document.getElementById("articles-list");
const viewer = document.getElementById("viewer");

// DISPLAY ARTICLES
function displayArticles(data) {
    list.innerHTML = "";
    data.forEach(article => {
        list.innerHTML += `
        <div class="article">
            <h3>${article.name}</h3>

            <button onclick="openPDF('${article.name}')">📖 Read</button>
            <a href="articles/${article.name}" download>⬇ Download</a>
        </div>
        `;
    });
}

// OPEN PDF IN VIEWER
function openPDF(file) {
    viewer.src = "articles/" + file;
}

// SEARCH
function searchArticles() {
    let input = document.getElementById("search").value.toLowerCase();
    let filtered = articles.filter(a => a.name.toLowerCase().includes(input));
    displayArticles(filtered);
}

// FILTER
function filterCategory(cat) {
    if (cat === "all") {
        displayArticles(articles);
    } else {
        let filtered = articles.filter(a => a.category === cat);
        displayArticles(filtered);
    }
}

// LOAD
displayArticles(articles);

</script>

</body>
</html>
